<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 字符集设置 -->
    <meta charset="UTF-8">
    <!-- 视口设置，确保在不同设备上正确显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 页面标题 -->
    <title>排任务工具</title>
    <!-- 引入样式文件 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 主容器 -->
    <div class="container">
        <!-- 主卡片，包含所有内容 -->
        <div class="main-card">
            <!-- 页面标题 -->
            <h1>排任务工具</h1>
            
            <!-- 可视化看板，显示关键指标 -->
            <div class="dashboard">
                <!-- 总任务数量 -->
                <div class="dashboard-item">
                    <div class="dashboard-value" id="total-tasks">0</div>
                    <div class="dashboard-label">总任务</div>
                </div>
                <!-- 已排任务数量 -->
                <div class="dashboard-item">
                    <div class="dashboard-value" id="scheduled-tasks">0</div>
                    <div class="dashboard-label">已排任务</div>
                </div>
                <!-- 未排任务数量 -->
                <div class="dashboard-item">
                    <div class="dashboard-value" id="unscheduled-tasks">0</div>
                    <div class="dashboard-label">未排任务</div>
                </div>
                <!-- 空余人员数量 -->
                <div class="dashboard-item">
                    <div class="dashboard-value" id="available-persons">0</div>
                    <div class="dashboard-label">空余人员</div>
                </div>
            </div>
            
            <!-- 导航标签，用于切换不同模块 -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="task-pool">任务池</button>
                <button class="tab-btn" data-tab="personnel">人员管理</button>
                <button class="tab-btn" data-tab="scheduling">排任务</button>
                <button class="tab-btn" data-tab="result">排任务结果</button>
            </div>
            
            <!-- 任务池模块，用于管理任务 -->
            <div class="tab-content active" id="task-pool">
                <h2>任务池管理</h2>
                <!-- 添加任务表单 -->
                <div class="form-container">
                    <h3>添加任务</h3>
                    <form id="add-task-form">
                        <div class="form-group">
                            <label for="task-name">任务名称：</label>
                            <input type="text" id="task-name" required>
                        </div>
                        <div class="form-group">
                            <label for="task-node">任务节点：</label>
                            <input type="date" id="task-node" required>
                        </div>
                        <div class="form-group">
                            <label for="task-skills">所需技能：</label>
                            <input type="text" id="task-skills" placeholder="用逗号分隔，如：图库,电话,短信" required>
                        </div>
                        <div class="form-group">
                            <label for="task-hours">所需人力（小时）：</label>
                            <input type="number" id="task-hours" min="1" required>
                        </div>
                        <button type="submit" class="btn">添加任务</button>
                    </form>
                </div>
                <!-- 任务列表表格 -->
                <div class="table-container">
                    <h3>任务列表</h3>
                    <table id="task-table">
                        <thead>
                            <tr>
                                <th>任务名称</th>
                                <th>任务节点</th>
                                <th>所需技能</th>
                                <th>所需人力</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 任务列表将通过JavaScript动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- 人员管理模块，用于管理人员和技能 -->
            <div class="tab-content" id="personnel">
                <h2>人员管理</h2>
                <!-- 添加人员表单 -->
                <div class="form-container">
                    <h3>添加人员</h3>
                    <form id="add-person-form">
                        <div class="form-group">
                            <label for="person-name">人员姓名：</label>
                            <input type="text" id="person-name" required>
                        </div>
                        <button type="submit" class="btn">添加人员</button>
                    </form>
                </div>
                <!-- 添加技能表单 -->
                <div class="form-container">
                    <h3>添加技能</h3>
                    <form id="add-skill-form">
                        <div class="form-group">
                            <label for="skill-person">选择人员：</label>
                            <select id="skill-person" required>
                                <!-- 人员列表将通过JavaScript动态生成 -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="skill-name">技能名称：</label>
                            <input type="text" id="skill-name" required>
                        </div>
                        <button type="submit" class="btn">添加技能</button>
                    </form>
                </div>
                <!-- 人员列表表格 -->
                <div class="table-container">
                    <h3>人员列表</h3>
                    <table id="person-table">
                        <thead>
                            <tr>
                                <th>人员姓名</th>
                                <th>技能</th>
                                <th>当天工作时长</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 人员列表将通过JavaScript动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- 排任务模块，用于执行排任务操作 -->
            <div class="tab-content" id="scheduling">
                <h2>排任务</h2>
                <!-- 排任务表单 -->
                <div class="form-container">
                    <h3>设置排任务日期</h3>
                    <form id="schedule-form">
                        <div class="form-group">
                            <label for="schedule-date">排任务日期：</label>
                            <input type="date" id="schedule-date" required>
                        </div>
                        <button type="submit" class="btn">开始排任务</button>
                        <button type="button" class="btn reset-btn" id="reset-schedule-btn">重置排任务结果</button>
                    </form>
                </div>
                <!-- 排任务结果显示区域 -->
                <div id="schedule-result">
                    <!-- 排任务结果将通过JavaScript动态生成 -->
                </div>
            </div>
            
            <!-- 排任务结果模块，显示排任务的详细结果 -->
            <div class="tab-content" id="result">
                <h2>排任务结果</h2>
                <div class="result-container">
                    <!-- 已排任务表格 -->
                    <div class="result-section">
                        <h3>已排任务</h3>
                        <table id="scheduled-tasks-table">
                            <thead>
                                <tr>
                                    <th>任务名称</th>
                                    <th>任务节点</th>
                                    <th>所需技能</th>
                                    <th>所需人力</th>
                                    <th>分配人员</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 已排任务将通过JavaScript动态生成 -->
                            </tbody>
                        </table>
                    </div>
                    <!-- 未排任务表格 -->
                    <div class="result-section">
                        <h3>未排任务</h3>
                        <table id="unscheduled-tasks-table">
                            <thead>
                                <tr>
                                    <th>任务名称</th>
                                    <th>任务节点</th>
                                    <th>所需技能</th>
                                    <th>所需人力</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 未排任务将通过JavaScript动态生成 -->
                            </tbody>
                        </table>
                    </div>
                    <!-- 空余人员表格 -->
                    <div class="result-section">
                        <h3>空余人员</h3>
                        <table id="available-persons-table">
                            <thead>
                                <tr>
                                    <th>人员姓名</th>
                                    <th>技能</th>
                                    <th>已分配时长</th>
                                    <th>剩余时长</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 空余人员将通过JavaScript动态生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>
                <!-- 底部操作栏，包含导出等功能 -->
                <div class="action-bar">
                    <button class="btn" id="copy-result-btn">复制结果文本</button>
                    <button class="btn" id="export-excel-btn">导出Excel</button>
                    <button class="btn" id="send-notification-btn">发送通知</button>
                </div>
            </div>
        </div>
    </div>
    <!-- 引入JavaScript文件 -->
    <script src="script.js"></script>
</body>
</html>
